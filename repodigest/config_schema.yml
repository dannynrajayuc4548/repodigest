# repodigest configuration schema
# All fields are optional unless marked required.

token:
  type: string
  required: true
  description: >-
    GitHub personal access token (or set GITHUB_TOKEN env var).

repo:
  type: string
  required: true
  pattern: "^[\\w.-]+/[\\w.-]+$"
  description: Repository in "owner/name" format.

days:
  type: integer
  default: 7
  min: 1
  max: 365
  description: Number of past days to include in the digest.

output_format:
  type: string
  default: text
  choices: [text, markdown, json]
  description: Rendering format for the digest.

output_file:
  type: string
  required: false
  description: Write output to this file path instead of stdout.

cache_ttl:
  type: integer
  default: 3600
  min: 0
  description: Cache time-to-live in seconds (0 disables caching).

filter:
  type: object
  required: false
  description: Optional filters applied to digest items.
  properties:
    authors:
      type: array
      items: string
      description: Only include activity from these GitHub logins.
    labels:
      type: array
      items: string
      description: Only include PRs/issues carrying at least one of these labels.
    exclude_bots:
      type: boolean
      default: false
      description: Drop activity authored by bot accounts.
    min_comments:
      type: integer
      default: 0
      min: 0
      description: Minimum comment count for PRs and issues.
    title_contains:
      type: string
      required: false
      description: Case-insensitive substring that must appear in the title or commit message.
